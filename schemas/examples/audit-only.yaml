# audit-only.yaml — PolicyDocument example: audit-only / observation mode
#
# Use case: a trusted internal agent where all actions are permitted but fully
# logged. No denials, no budget cap, no schedule restriction, no redaction.
# Useful for baselining agent behaviour before applying stricter policies.

network:
  allowlist:
    - "*"

tools:
  web_search:
    allow: true
  code_interpreter:
    allow: true
  file_read:
    allow: true
  file_write:
    allow: true
  shell:
    allow: true

data:
  sensitive_patterns: []

budget:
  daily_limit_usd: 500.00

schedule:
  active_hours:
    start: "00:00"
    end: "23:59"
    timezone: UTC
