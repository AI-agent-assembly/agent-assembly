[advisories]
unmaintained = "all"
unsound = "all"
yanked = "all"
notice = "all"
ignore = []

[licenses]
unlicensed = "deny"
allow-osi-fsf-free = "either"
copyleft = "warn"
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
]
deny = [
    "GPL-2.0",
    "GPL-3.0",
    "AGPL-3.0",
]
confidence-threshold = 0.92

[bans]
multiple-versions = "warn"
wildcards = "warn"
deny = [
    { name = "openssl", use-instead = "rustls" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
