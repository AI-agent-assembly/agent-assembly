[advisories]
# Scope selectors for advisory checks: "all", "workspace", "transitive", "none"
# "workspace"  — flag only advisories that affect crates you directly depend on
# "all"        — flag advisories across the entire transitive dependency graph
unmaintained = "workspace"
unsound = "all"
# Lint level for yanked crates: "allow", "warn", "deny"
yanked = "warn"
# Advisory IDs or crate@version entries to ignore (e.g. RUSTSEC-YYYY-NNNN)
ignore = []

[licenses]
# Minimum confidence threshold for license text inference (0.0–1.0)
confidence-threshold = 0.92
# Any license not listed here is implicitly denied — GPL/AGPL/LGPL excluded by omission
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
]

[bans]
# Warn on multiple versions of the same crate in the dependency graph
multiple-versions = "warn"
# Warn on wildcard dependency requirements (e.g. foo = "*")
wildcards = "warn"
# Crates that must never appear; prefer rustls over openssl for pure-Rust TLS
deny = [
    { crate = "openssl", use-instead = "rustls" },
]

[sources]
# Deny dependencies from registries not in allow-registry
unknown-registry = "deny"
# Deny dependencies from git sources not in allow-git
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
