# aa-runtime policy configuration
#
# Mount this file into the aa-runtime container at /etc/aa/policy.yaml
# (or set AA_POLICY_PATH to a custom path).
#
# Schema:
#   rules:
#     - name: <string>            # Human-readable rule name (appears in violation logs)
#       blocked_actions:
#         - <ACTION_TYPE_NAME>    # Proto enum name from ActionType (e.g. TOOL_CALL, FILE_OPERATION)
#
# If this file is absent, aa-runtime starts without enforcement (a WARN is logged).
# If this file is present but malformed, aa-runtime refuses to start (exits with error).

rules:
  - name: block-file-exfiltration
    blocked_actions:
      - FILE_OPERATION    # blocks any agent action classified as a file operation

  - name: block-network-egress
    blocked_actions:
      - NETWORK_CALL      # blocks outbound network requests/calls made by the agent

  - name: block-code-execution
    blocked_actions:
      - PROCESS_EXEC      # blocks arbitrary process/code execution actions
