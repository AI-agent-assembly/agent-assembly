syntax = "proto3";

package agent_assembly.v1;

// Policy defines a governance rule set applied to one or more agents.
message Policy {
  // Unique identifier for the policy.
  string id = 1;

  // Human-readable name of the policy.
  string name = 2;

  // Risk tier this policy enforces.
  RiskTier tier = 3;

  // Serialised rule definitions (YAML/JSON body).
  string rules = 4;

  // ISO 8601 timestamp of when the policy was created.
  string created_at = 5;
}

// RiskTier classifies policies by the risk level they govern.
enum RiskTier {
  RISK_TIER_UNSPECIFIED = 0;
  RISK_TIER_LOW = 1;
  RISK_TIER_MEDIUM = 2;
  RISK_TIER_HIGH = 3;
}

// EvaluatePolicyRequest asks the gateway to evaluate a policy for an agent action.
message EvaluatePolicyRequest {
  string agent_id = 1;
  string action = 2;
  map<string, string> context = 3;
}

// EvaluatePolicyResponse returns the enforcement decision.
message EvaluatePolicyResponse {
  bool allowed = 1;
  string reason = 2;
  string policy_id = 3;
}

// GetPolicyRequest identifies a policy to retrieve.
message GetPolicyRequest {
  string id = 1;
}

// GetPolicyResponse returns a single policy record.
message GetPolicyResponse {
  Policy policy = 1;
}

// PolicyService handles policy evaluation and retrieval.
service PolicyService {
  // EvaluatePolicy checks whether an agent action is permitted under policy.
  rpc EvaluatePolicy(EvaluatePolicyRequest) returns (EvaluatePolicyResponse);

  // GetPolicy retrieves a policy definition by its ID.
  rpc GetPolicy(GetPolicyRequest) returns (GetPolicyResponse);
}
