sonar.host.url=https://sonarcloud.io
sonar.projectKey=AI-agent-assembly_agent-assembly
sonar.organization=ai-agent-assembly

sonar.projectName=agent-assembly
sonar.projectVersion=0.0.1

sonar.projectBaseDir=./

# ── Sources ───────────────────────────────────────────────────────────────────
# Rust crates and the React/TypeScript dashboard are listed separately so
# SonarCloud applies the correct language analyser to each directory.
sonar.sources=\
  aa-core/src,\
  aa-runtime/src,\
  aa-proxy/src,\
  aa-ffi-python/src,\
  aa-ffi-node/src,\
  aa-wasm/src,\
  aa-gateway/src,\
  aa-api/src,\
  aa-cli/src,\
  dashboard/src

# ── Rust language settings ────────────────────────────────────────────────────
# cargo clippy --message-format=json output is fed in via sonar.yml CI step.
sonar.rust.file.suffixes=.rs
sonar.rust.clippy.reportPaths=clippy-report.json

# ── Coverage ──────────────────────────────────────────────────────────────────
# LCOV report generated by cargo-llvm-cov in sonar.yml.
# sonar.yml runs: cargo llvm-cov --lcov --output-path lcov.info
# Note: sonar.coverageReportPaths is for Generic Coverage XML format.
# LCOV files (.info) must use sonar.lcov.reportPaths instead.
sonar.lcov.reportPaths=lcov.info

# ── TypeScript / JavaScript language settings ─────────────────────────────────
# SonarCloud auto-detects TypeScript from file extensions, but explicit suffix
# configuration ensures .tsx React components and .ts modules are both covered.
sonar.typescript.file.suffixes=.ts,.tsx
sonar.javascript.file.suffixes=.js,.jsx

# ── Exclusions ────────────────────────────────────────────────────────────────
# Exclude generated files, build output, and dependencies from analysis to
# avoid noise and inflated metrics.
sonar.exclusions=\
  **/node_modules/**,\
  dashboard/dist/**,\
  **/target/**,\
  aa-ebpf/src/**

# aa-ebpf is excluded because its build.rs invokes the nightly toolchain
# (required for BPF cross-compilation) which is not installed in the Sonar job.
# eBPF-side code is validated by the dedicated ebpf-build CI job instead.

sonar.sourceEncoding=UTF-8
sonar.scm.provider=git
