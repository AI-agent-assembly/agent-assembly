version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "daily"
    labels: ["dependencies", "rust"]
    commit-message:
      prefix: "⬆"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    labels: ["dependencies", "github-actions"]
    commit-message:
      prefix: "⬆"
