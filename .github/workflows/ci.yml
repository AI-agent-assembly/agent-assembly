name: CI

on:
  push:
    branches: [master]
    paths:
      - "aa-*/**"
      - "proto/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "deny.toml"
      - "dashboard/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [master]
    paths:
      - "aa-*/**"
      - "proto/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "deny.toml"
      - "dashboard/**"
      - ".github/workflows/ci.yml"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install protobuf compiler
        run: sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Build workspace
        run: cargo build --workspace

  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install protobuf compiler
        run: sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install protobuf compiler
        run: sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install cargo-nextest
        uses: taiki-e/install-action@83c419a40a2e48673b2c523337e57f602dfe53c9 # cargo-nextest
      - name: Run tests
        run: cargo nextest run --workspace --no-tests=pass

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install protobuf compiler
        run: sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@3f7f2bd74f95d407a45d96b106f26d4f6c238fab # cargo-llvm-cov
      - name: Generate coverage report
        run: cargo llvm-cov --all-features --workspace --codecov --output-path codecov.xml
      - name: Upload to Codecov
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          files: ./codecov.xml
          flags: rust
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  deny:
    name: Dependency checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: EmbarkStudios/cargo-deny-action@91bf2b620e09e18d6eb78b92e7861937469acedb # v2
        with:
          command: check
          arguments: --all-features

  dashboard:
    name: Dashboard (type-check + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.9.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: dashboard/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Type check
        run: pnpm type-check
      - name: Lint
        run: pnpm lint

  no-std:
    name: no_std targets
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: wasm32-unknown-unknown
          - target: thumbv7em-none-eabihf
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Build aa-core (no_std + alloc)
        env:
          TARGET: ${{ matrix.target }}
        run: |
          cargo build -p aa-core \
            --target "$TARGET" \
            --no-default-features \
            --features alloc

  buf-lint:
    name: Proto lint & breaking check (buf)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for buf breaking --against
      - uses: bufbuild/buf-setup-action@v1.50.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Lint proto files
        run: buf lint
        working-directory: proto
      - name: Create local base branch for buf breaking check
        if: github.event_name == 'pull_request'
        run: git fetch origin ${{ github.base_ref }}:${{ github.base_ref }}
      - name: Check breaking changes against base branch
        if: github.event_name == 'pull_request'
        run: |
          buf breaking \
            --against "../.git#branch=${{ github.base_ref }},subdir=proto"
        working-directory: proto


  schema-lint:
    name: Schema lint & validation (ajv)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install ajv-cli
        run: npm install -g ajv-cli
      - name: Validate schema is self-consistent (ajv --strict)
        run: ajv compile --strict -s schemas/policy/v1/policy-document.schema.json
      - name: Validate example policy documents against schema
        run: |
          ajv validate \
            -s schemas/policy/v1/policy-document.schema.json \
            -d schemas/examples/strict.yaml
          ajv validate \
            -s schemas/policy/v1/policy-document.schema.json \
            -d schemas/examples/balanced.yaml
          ajv validate \
            -s schemas/policy/v1/policy-document.schema.json \
            -d schemas/examples/audit-only.yaml
