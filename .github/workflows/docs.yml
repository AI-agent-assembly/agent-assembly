name: Docs

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - '.github/workflows/docs.yml'
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - '.github/workflows/docs.yml'

jobs:
  build:
    name: Build mdBook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache mdBook binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/mdbook
            ~/.cargo/bin/mdbook-mermaid
          key: ${{ runner.os }}-mdbook-0.5.2-mermaid-0.17.0

      - name: Install mdBook
        run: |
          if ! command -v mdbook >/dev/null; then
            cargo install --locked --version 0.5.2 mdbook
          fi

      - name: Install mdbook-mermaid
        run: |
          if ! command -v mdbook-mermaid >/dev/null; then
            cargo install --locked --version 0.17.0 mdbook-mermaid
          fi

      - name: Build book
        run: mdbook build docs

      - name: Upload book artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-assembly-book
          path: docs/book/
          retention-days: 7
